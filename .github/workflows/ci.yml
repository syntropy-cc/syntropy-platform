# Syntropy Platform — CI pipeline (COMP-001.4)
# Runs lint, typecheck, test, build on push/PR.

name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
    steps:
      - name: Checkout
        uses: actions/checkout@4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm turbo run lint

      - name: Typecheck
        run: pnpm turbo run typecheck

      - name: Test
        run: pnpm turbo run test

      - name: Build
        run: pnpm turbo run build

  # COMP-035.5: Build IDE container images (syntropy/ide-base, ide-labs, ide-hub)
  docker-ide:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@3

      - name: Build ide-base
        uses: docker/build-push-action@6
        with:
          context: ./docker/ide-base
          push: false
          load: true
          tags: syntropy/ide-base:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build ide-labs
        uses: docker/build-push-action@6
        with:
          context: ./docker/ide-labs
          push: false
          load: true
          tags: syntropy/ide-labs:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build ide-hub
        uses: docker/build-push-action@6
        with:
          context: ./docker/ide-hub
          push: false
          load: true
          tags: syntropy/ide-hub:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Push to GHCR (main/master only)
        if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && github.event_name != 'pull_request'
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          IMG_PREFIX=ghcr.io/${{ github.repository_owner }}/ide
          docker tag syntropy/ide-base:latest $IMG_PREFIX-base:latest
          docker tag syntropy/ide-labs:latest $IMG_PREFIX-labs:latest
          docker tag syntropy/ide-hub:latest $IMG_PREFIX-hub:latest
          docker push $IMG_PREFIX-base:latest
          docker push $IMG_PREFIX-labs:latest
          docker push $IMG_PREFIX-hub:latest
